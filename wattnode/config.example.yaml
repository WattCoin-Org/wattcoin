# WattNode Configuration

# Your Solana wallet address (required)
wallet: "YourSolanaWalletAddressHere"

# Private key for signing sensor oracle data (hex-encoded Ed25519)
# Alternatively, set environment variable WATT_PRIVATE_KEY
wallet_private_key: ""

# Node identity
name: "my-node"

# Capabilities (comma-separated list)
capabilities:
  - scrape
  # - inference   # uncomment if Ollama is installed

# Web scraping settings
scrape:
  user_agent: "WattNode/1.0"
  timeout_sec: 30

# Inference settings (Ollama)
inference:
  base_url: "http://localhost:11434"
  model: "llama2"

# Sensor Oracle settings (Raspberry Pi)
oracle:
  enabled: true                     # Set to false to skip sensor reporting
  mock: false                       # Use mock sensor data (for testing)
  interval: 60                      # Reporting interval in seconds
  api_endpoint: "https://your-backend-url.example.com/api/v1/oracle/report"
  sensors:
    - dht22
    # - pir                          # Uncomment to enable PIR motion sensor
  dht_pin: "D4"                     # GPIO pin for DHT22 (using board.D4)
  pir_pin: 17                       # BCM pin for PIR sensor
  db_path: "data/oracle_history.db" # Local SQLite database path
